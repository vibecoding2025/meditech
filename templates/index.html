{% extends "base.html" %}
{% block title %}Upload{% endblock %}

{% block content %}
<h1>📂 Upload CSV File</h1>
<p class="subtitle">Select your file type and upload your CSV to process it.</p>

<form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data" class="upload-form">
    <div class="form-group">
        <label>🏷️ File Type</label>
        <div class="radio-group">
            <label class="radio-card radio-export">
                <input type="radio" name="file_type" value="export" checked>
                <div class="radio-card-body">
                    <strong>📦 Export Data</strong>
                    <span>Product catalogue with barcodes &amp; quantities (Export.CSV)</span>
                </div>
            </label>
            <label class="radio-card radio-unsold">
                <input type="radio" name="file_type" value="unsold">
                <div class="radio-card-body">
                    <strong>📋 Unsold Products</strong>
                    <span>Unsold inventory with delivery dates (Unsold products.CSV)</span>
                </div>
            </label>
            <label class="radio-card radio-titan">
                <input type="radio" name="file_type" value="titan_stock">
                <div class="radio-card-body">
                    <strong>💊 Titan Stock</strong>
                    <span>Drug stock levels with dispensing dates (Titan_Stock.CSV)</span>
                </div>
            </label>
        </div>
    </div>

    <div class="form-group">
        <label for="ods_code">🏥 ODS Code (required to view Drug Tariff pricing)</label>
        <input type="text" name="ods_code" id="ods_code" placeholder="e.g. FLJ64" required
               style="width: 100%; padding: 0.6rem 0.8rem; border: 2px solid var(--border); border-radius: var(--radius); font-size: 0.9rem;"
               maxlength="10" pattern="[A-Za-z0-9]+" title="Enter your pharmacy ODS code (letters and numbers only)">
    </div>

    <div class="form-group">
        <label for="csvfile">📎 Select CSV File</label>
        <div class="file-drop" id="dropZone">
            <input type="file" name="csvfile" id="csvfile" accept=".csv,.CSV" required>
            <p>📁 Drag &amp; drop your CSV here, or <strong>click to browse</strong></p>
            <p class="file-name" id="fileName"></p>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">⚡ Process File</button>
</form>
{% endblock %}

{% block scripts %}
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('csvfile');
const fileName = document.getElementById('fileName');

fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
        fileName.textContent = fileInput.files[0].name;
        dropZone.classList.add('has-file');
    }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
        dropZone.classList.add('has-file');
    }
});
</script>
{% endblock %}
